<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceDebt | Smart Debt Tracking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="manifest" href="manifest.json">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="js/app.js"></script>
</head>
<body>
    
    <div id="loading">
        <div class="loader-spinner"></div>
        <p>Loading AI models...</p>
    </div>

    <header>
        <div class="logo">
            <h1>Face<span>Debt</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="#add-face">Add Person</a></li>
                <li><a href="#scan-face">Scan Face</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="add-face" class="card">
            <h2>Add a New Person</h2>
            <p class="subtitle">Capture their face and record the debt.</p>

            <div class="camera-wrapper">
                <video id="camera" autoplay muted playsinline></video>
                <canvas id="face-snap" style="display:none;"></canvas>
            </div>

            <div class="controls">
                <button id="start-camera" class="btn btn-secondary">Start Camera</button>
                <button id="flip-cam" class="btn btn-flip" title="Switch between front/back camera">Flip Camera</button>
                <button id="capture" class="btn btn-primary">Capture Face</button>
            </div>

            <div class="form-group">
                <div class="input-field">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" placeholder="e.g. John Doe">
                </div>
                <div class="input-field">
                    <label for="debt-amount">Debt Amount (₹)</label>
                    <input type="number" id="debt-amount" placeholder="0.00">
                </div>
            </div>

            <button id="face-add" class="btn btn-success btn-block">Add to Records</button>
        </section>

        <section id="scan-face" class="card">
            <h2>Identify & Check Debt</h2>
            <p class="subtitle">Point the camera at someone to see their debt.</p>

            <div class="camera-wrapper">
                <video id="scanner" autoplay muted playsinline></video>
            </div>
            
            <button id="btn-scan" class="btn btn-primary btn-block">Scan the Face</button>

            <div id="result" class="result-area"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FaceDebt. FrontEnd with AI for smarter debt tracking.</p>
    </footer>

</body>
</html>
